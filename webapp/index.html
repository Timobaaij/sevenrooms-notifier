<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#080d1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Maître" />
<title>Maître</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
<style>
  :root{
    color-scheme: dark;
    --ground:#080d1a; --ground-deep:#05080f; --panel:#0f1830; --panel-hi:#14203c; --panel-line:#1b2a4a;
    --gold:#e4c47c; --gold-bright:#f4db9a; --gold-deep:#c9a24e; --gold-glow:rgba(228,196,124,.16);
    --champagne:#f4efe2; --text:#cad4ea; --muted:#8492af; --faint:#58637f;
    --open:#74d3ab; --wait:#e0b062; --paused:#6b768f; --danger:#e88a8a;
    --hair:rgba(228,196,124,.14); --hair-soft:rgba(255,255,255,.06); --scrim:rgba(4,6,12,.6);
    --serif:"New York",ui-serif,Georgia,"Hoefler Text","Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono","SFMono-Regular","Roboto Mono",monospace;
    --r:20px; --pill:999px;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(700px 380px at 50% -6%, #101a35 0%, transparent 58%), var(--ground);
    color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased;
    min-height:100dvh;
  }
  .app{max-width:480px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column;
       padding-top:var(--safe-t); position:relative;}

  /* Top bar */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:16px 20px 8px; position:sticky; top:0; z-index:15;
          background:linear-gradient(to bottom, var(--ground) 70%, transparent);}
  .wordmark{display:flex; align-items:center; gap:9px; font-family:var(--serif); font-size:20px; letter-spacing:.16em; text-transform:uppercase; color:var(--champagne)}
  .diamond{width:9px;height:9px;transform:rotate(45deg);background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));box-shadow:0 0 10px var(--gold-glow)}
  .iconbtn{width:40px;height:40px;display:grid;place-items:center;border-radius:var(--pill);color:var(--muted);background:transparent;border:1px solid transparent;cursor:pointer;transition:.18s}
  .iconbtn:hover{color:var(--champagne);background:rgba(255,255,255,.04)}
  .iconbtn:active{transform:scale(.92)}
  .iconbtn.spin svg{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .body{flex:1 1 auto; overflow-y:auto; padding:4px 20px calc(120px + var(--safe-b)); scrollbar-width:none}
  .body::-webkit-scrollbar{display:none}
  .largetitle{font-family:var(--serif);font-weight:500;font-size:38px;line-height:1.03;letter-spacing:-.01em;color:var(--champagne);margin:6px 0 2px;text-wrap:balance}
  .subtitle{color:var(--muted);font-size:14.5px;margin:0 0 20px}

  .view{display:none;animation:fade .32s ease both}
  .view.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* Watch card */
  .watch{border-radius:var(--r);background:linear-gradient(168deg,var(--panel-hi),var(--panel));border:1px solid var(--hair-soft);padding:17px 18px;margin-bottom:14px}
  .watch.is-paused{opacity:.62}
  .watch-head{display:flex;align-items:center;gap:12px}
  .venue{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--champagne);line-height:1.1;flex:1 1 auto;text-wrap:balance;word-break:break-word}
  .statuschip{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 11px 0 9px;border-radius:var(--pill);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  .statuschip--live{color:var(--open);background:rgba(116,211,171,.10);border:1px solid rgba(116,211,171,.24)}
  .statuschip--pause{color:var(--paused);background:rgba(107,118,143,.12);border:1px solid rgba(107,118,143,.24)}
  .statuschip .tinydot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .statuschip--live .tinydot{animation:blink 1.8s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--hair-soft)}
  .m{display:flex;align-items:flex-start;gap:8px;font-size:13.5px}
  .m svg{color:var(--gold-deep);flex:0 0 auto;margin-top:1px}
  .m .k{color:var(--faint);font-size:11px;display:block;letter-spacing:.04em;text-transform:uppercase;margin-bottom:1px}
  .m .v{color:var(--text);font-weight:500}
  .m .v.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .datechips{display:flex;flex-wrap:wrap;gap:6px}
  .datechip{font-family:var(--mono);font-size:11.5px;color:var(--text);padding:3px 8px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--hair-soft)}
  .pill{display:inline-flex;align-items:center;gap:5px;height:25px;padding:0 10px;border-radius:var(--pill);font-size:11.5px;font-weight:600;color:var(--text);background:rgba(255,255,255,.05);border:1px solid var(--hair-soft)}
  .pill--sr{color:var(--gold-bright);border-color:var(--hair);background:rgba(228,196,124,.08)}
  .pill--ot{color:#cbb4ea;border-color:rgba(176,148,224,.24);background:rgba(176,148,224,.09)}
  .watch-actions{display:flex;align-items:center;gap:10px;margin-top:16px}
  .toggle{position:relative;width:50px;height:30px;flex:0 0 auto;border-radius:var(--pill);cursor:pointer;background:#26314c;border:1px solid var(--hair-soft);transition:background .22s}
  .toggle .knob{position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#eef1f8;box-shadow:0 2px 5px rgba(0,0,0,.4);transition:transform .22s cubic-bezier(.4,1.3,.5,1)}
  .toggle.on{background:linear-gradient(140deg,var(--gold),var(--gold-deep))}
  .toggle.on .knob{transform:translateX(20px)}
  .linkbtn{background:none;border:none;color:var(--muted);font:600 13.5px var(--sans);cursor:pointer;padding:6px 4px}
  .linkbtn:hover{color:var(--champagne)}
  .linkbtn.danger:hover{color:var(--danger)}

  /* States */
  .state{padding:60px 24px;text-align:center;color:var(--muted)}
  .state .big{font-family:var(--serif);font-size:24px;color:var(--champagne);margin:14px 0 6px}
  .spinner{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--hair-soft);border-top-color:var(--gold);margin:0 auto;animation:spin .9s linear infinite}
  .state .emblem{width:56px;height:56px;transform:rotate(45deg);margin:0 auto 6px;border-radius:8px;background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));box-shadow:0 0 24px var(--gold-glow);opacity:.9}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:52px;padding:0 22px;border-radius:var(--pill);font:600 16px var(--sans);cursor:pointer;border:1px solid transparent;transition:transform .13s,filter .18s,background .18s}
  .btn:active{transform:scale(.98)}
  .btn--gold{color:#241a05;background:linear-gradient(140deg,var(--gold-bright),var(--gold) 52%,var(--gold-deep));box-shadow:0 6px 18px rgba(185,143,66,.28)}
  .btn--gold:hover{filter:brightness(1.05)}
  .btn--gold[disabled]{opacity:.5;filter:grayscale(.3);cursor:default}
  .btn--ghost{color:var(--gold);background:transparent;border-color:var(--hair)}
  .btn--block{width:100%}

  /* Tab bar */
  .tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;height:calc(84px + var(--safe-b));padding:8px 30px calc(20px + var(--safe-b));display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to top,var(--ground-deep) 66%,transparent);z-index:20}
  .tabbar::before{content:"";position:absolute;top:0;left:24px;right:24px;height:1px;background:var(--hair)}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;width:80px;padding:6px 0;color:var(--faint);background:none;border:none;cursor:pointer;font-size:10.5px;font-weight:600;letter-spacing:.03em;transition:color .18s}
  .tab.active{color:var(--gold)}
  .tab:active{transform:scale(.94)}
  .fab{width:58px;height:58px;flex:0 0 auto;margin-top:-16px;border-radius:50%;display:grid;place-items:center;color:#241a05;cursor:pointer;border:none;background:linear-gradient(140deg,var(--gold-bright),var(--gold) 55%,var(--gold-deep));box-shadow:0 10px 26px rgba(185,143,66,.42),inset 0 1px 0 rgba(255,255,255,.35);transition:transform .14s,filter .18s}
  .fab:hover{filter:brightness(1.06)}.fab:active{transform:scale(.93)}

  /* Sheet */
  .scrim{position:fixed;inset:0;z-index:30;background:var(--scrim);opacity:0;pointer-events:none;transition:opacity .28s;backdrop-filter:blur(2px)}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;transform:translate(-50%,100%);bottom:0;width:100%;max-width:480px;z-index:31;background:linear-gradient(180deg,var(--panel-hi),var(--ground));border-top:1px solid var(--hair);border-radius:26px 26px 0 0;padding:12px 22px calc(30px + var(--safe-b));max-height:92dvh;overflow-y:auto;transition:transform .34s cubic-bezier(.32,.72,0,1);scrollbar-width:none}
  .sheet::-webkit-scrollbar{display:none}
  .sheet.open{transform:translate(-50%,0)}
  .dragzone{margin:0 -22px 8px;padding:10px 0 12px;display:flex;justify-content:center;touch-action:none;cursor:grab}
  .dragzone:active{cursor:grabbing}
  .grabber{width:44px;height:5px;border-radius:999px;background:#3b496b}
  .sheet-close{position:absolute;top:14px;right:14px;width:40px;height:40px;display:grid;place-items:center;border-radius:var(--pill);border:1px solid var(--hair-soft);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer;z-index:3}
  .sheet-close:hover{color:var(--champagne);background:rgba(255,255,255,.09)}
  .sheet-close:active{transform:scale(.92)}
  .sheet h2{font-family:var(--serif);font-weight:500;font-size:26px;color:var(--champagne);margin:0 0 18px;letter-spacing:-.01em}
  .field{margin-bottom:16px}
  .field>label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:8px}
  .input{width:100%;height:50px;padding:0 15px;border-radius:13px;color:var(--champagne);background:rgba(255,255,255,.04);border:1px solid var(--panel-line);font:15px var(--sans);transition:.18s}
  .input::placeholder{color:var(--faint)}
  .input:focus{outline:none;border-color:var(--gold);background:rgba(228,196,124,.05)}
  .input.mono{font-family:var(--mono)}
  /* Native time/date pickers: keep the OS roller, just make the icon visible on dark. */
  .input[type="time"],.input[type="date"]{min-height:50px}
  .input[type="time"]{width:auto;min-width:120px;max-width:100%}
  .input::-webkit-calendar-picker-indicator{filter:invert(.85);opacity:.65;cursor:pointer}
  .input::-webkit-calendar-picker-indicator:hover{opacity:1}
  .helper{font-size:12px;color:var(--faint);margin:7px 2px 0}
  .segmented{display:flex;gap:4px;padding:4px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid var(--panel-line)}
  .seg{flex:1 1 0;height:42px;border:none;cursor:pointer;border-radius:10px;background:transparent;color:var(--muted);font:600 13.5px var(--sans);transition:.18s}
  .seg.active{color:#241a05;background:linear-gradient(140deg,var(--gold-bright),var(--gold-deep))}
  .stepper{display:flex;align-items:center;border:1px solid var(--panel-line);border-radius:13px;overflow:hidden;background:rgba(255,255,255,.04);width:fit-content}
  .stepper button{width:50px;height:50px;border:none;background:transparent;color:var(--gold);font-size:22px;cursor:pointer}
  .stepper button:hover{background:rgba(228,196,124,.08)}
  .stepper .n{width:54px;text-align:center;font-family:var(--mono);font-size:18px;color:var(--champagne)}
  .tworow{display:flex;gap:12px}.tworow .field{flex:1 1 0}
  .addchip{display:flex;gap:8px;align-items:center}
  .chipwrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .rmchip{font-family:var(--mono);font-size:12px;color:var(--text);padding:5px 10px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid var(--hair-soft);cursor:pointer}
  .rmchip:hover{border-color:var(--danger);color:var(--danger)}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:calc(104px + var(--safe-b));transform:translate(-50%,20px);z-index:40;background:var(--panel-hi);border:1px solid var(--hair);color:var(--champagne);padding:12px 18px;border-radius:var(--pill);font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.28s;box-shadow:0 10px 30px rgba(0,0,0,.5);display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  .toast.err{border-color:rgba(232,138,138,.4)}
  .toast .dot{width:8px;height:8px;border-radius:50%;background:var(--open)}
  .toast.err .dot{background:var(--danger)}

  a:focus-visible,button:focus-visible,.input:focus-visible,.toggle:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="wordmark"><span class="diamond"></span>Maître</div>
    <button class="iconbtn" id="refreshBtn" aria-label="Refresh" title="Refresh">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
    </button>
  </div>

  <div class="body">
    <!-- THE BOOK -->
    <section class="view show" id="view-book">
      <h1 class="largetitle">The Book</h1>
      <p class="subtitle">Every table Maître is watching for you.</p>
      <div id="watchlist"></div>
    </section>

    <!-- OPENINGS -->
    <section class="view" id="view-openings">
      <h1 class="largetitle">Openings</h1>
      <p class="subtitle">How alerts reach you.</p>
      <div id="openings"></div>
    </section>
  </div>

  <!-- Tab bar -->
  <nav class="tabbar">
    <button class="tab active" data-view="book">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5z"/><path d="M4 20.5A2.5 2.5 0 0 1 6.5 18H20v3H6.5A2.5 2.5 0 0 1 4 20.5z"/></svg>
      The Book
    </button>
    <button class="fab" id="addBtn" aria-label="Add a table to watch">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="tab" data-view="openings">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      Openings
    </button>
  </nav>

  <!-- Add / edit sheet -->
  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Watch details">
    <div class="dragzone" id="dragzone"><div class="grabber"></div></div>
    <button class="sheet-close" id="closeSheetBtn" aria-label="Cancel">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <h2 id="sheetTitle">New watch</h2>

    <div class="field"><label>Platform</label>
      <div class="segmented" id="platSeg">
        <button class="seg active" data-v="sevenrooms">SevenRooms</button>
        <button class="seg" data-v="opentable">OpenTable</button>
      </div>
    </div>
    <div class="field"><label for="f-name">Name</label>
      <input class="input" id="f-name" placeholder="e.g. Dover Street Ella" />
    </div>
    <div class="field"><label for="f-venues">Venue slug(s)</label>
      <input class="input" id="f-venues" placeholder="comma-separated, e.g. doverstreetcounter" />
      <p class="helper">The bit after <code>?venue=</code> (SevenRooms) or <code>/r/</code> (OpenTable).</p>
    </div>

    <div class="tworow">
      <div class="field"><label>Party</label>
        <div class="stepper"><button id="pminus" aria-label="Fewer">–</button><span class="n" id="pnum">2</span><button id="pplus" aria-label="More">+</button></div>
      </div>
      <div class="field"><label>Days to scan</label>
        <div class="stepper"><button id="dminus" aria-label="Fewer">–</button><span class="n" id="dnum">1</span><button id="dplus" aria-label="More">+</button></div>
      </div>
    </div>
    <div class="field"><label>Time</label>
      <div class="segmented" id="timeSeg">
        <button class="seg active" data-v="window">Any in window</button>
        <button class="seg" data-v="exact">Exact</button>
      </div>
    </div>
    <div class="tworow" id="windowRow">
      <div class="field"><label for="f-ws">From</label><input class="input" id="f-ws" type="time" value="19:00" /></div>
      <div class="field"><label for="f-we">Until</label><input class="input" id="f-we" type="time" value="21:30" /></div>
    </div>
    <div id="exactRow" style="display:none">
      <div class="field"><label for="f-exact">Exact time</label><input class="input" id="f-exact" type="time" value="19:00" /></div>
      <button class="btn btn--ghost btn--block" id="loadTimes" style="height:44px;margin-bottom:8px">Load available times</button>
      <div class="chipwrap" id="timeChips"></div>
    </div>

    <div class="field"><label>Dates</label>
      <div class="addchip"><input class="input" type="date" id="f-date" /><button class="btn btn--ghost" id="addDate" style="height:50px;padding:0 18px">Add</button></div>
      <div class="chipwrap" id="dateChips"></div>
    </div>

    <div class="field"><label>Notify me by</label>
      <div class="segmented" id="notifySeg">
        <button class="seg active" data-v="push">Push</button>
        <button class="seg" data-v="email">Email</button>
        <button class="seg" data-v="both">Both</button>
        <button class="seg" data-v="none">None</button>
      </div>
    </div>
    <div class="field"><label for="f-email">Email alert to (optional)</label>
      <input class="input" id="f-email" type="email" inputmode="email" placeholder="you@example.com" />
    </div>

    <button class="btn btn--gold btn--block" id="saveBtn">Start watching</button>
    <button class="linkbtn" id="cancelBtn" style="width:100%;margin-top:8px;height:44px">Cancel</button>
    <button class="linkbtn danger" id="deleteBtn" style="display:none;width:100%;margin-top:2px;height:44px">Delete this watch</button>
  </div>

  <div class="toast" id="toast"><span class="dot"></span><span id="toastMsg"></span></div>
</div>

<script>
(function(){
  "use strict";
  var API = "api/config";
  var STATE = { config:{searches:[]}, sha:null, key: localStorage.getItem("maitre_key")||"", editIndex:null };

  var $ = function(s){ return document.querySelector(s); };
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

  function toast(msg, err){
    var t = $("#toast"); $("#toastMsg").textContent = msg;
    t.classList.toggle("err", !!err); t.classList.add("show");
    clearTimeout(toast._t); toast._t = setTimeout(function(){ t.classList.remove("show"); }, 2600);
  }

  // ---- API (talks to the tiny proxy; the GitHub token lives there, never here) ----
  function api(method, body){
    var headers = { "content-type":"application/json" };
    if (STATE.key) headers["x-access-key"] = STATE.key;
    return fetch(API, { method:method, headers:headers, body: body?JSON.stringify(body):undefined })
      .then(function(r){
        if (r.status === 401){ var e = new Error("unauthorized"); e.code=401; throw e; }
        if (!r.ok){ return r.text().then(function(tx){ var e=new Error(tx||("HTTP "+r.status)); e.code=r.status; throw e; }); }
        return r.json();
      });
  }

  function loadConfig(){
    renderState("loading");
    api("GET").then(function(res){
      STATE.config = res.config || { searches:[] };
      if (!Array.isArray(STATE.config.searches)) STATE.config.searches = [];
      STATE.sha = res.sha;
      render();
    }).catch(function(e){
      if (e.code === 401){ promptKey(); return; }
      renderState("error", e.message);
    });
  }

  function saveConfig(successMsg){
    return api("PUT", { config: STATE.config, sha: STATE.sha }).then(function(res){
      STATE.sha = res.sha || STATE.sha;
      toast(successMsg || "Saved");
      render();
    }).catch(function(e){
      if (e.code === 409){ // someone else edited it — reload and ask to retry
        toast("Changed elsewhere — reloading", true); loadConfig(); return;
      }
      if (e.code === 401){ promptKey(); return; }
      toast("Save failed: " + e.message, true);
      throw e;
    });
  }

  function promptKey(){
    var k = window.prompt("This Maître is protected. Enter the access key:", "");
    if (k){ STATE.key = k.trim(); localStorage.setItem("maitre_key", STATE.key); loadConfig(); }
    else { renderState("error", "An access key is required."); }
  }

  // ---- Rendering ----
  function renderState(kind, detail){
    var el = $("#watchlist");
    if (kind === "loading"){ el.innerHTML = '<div class="state"><div class="spinner"></div><div style="margin-top:16px">Opening the book…</div></div>'; return; }
    if (kind === "error"){ el.innerHTML = '<div class="state"><div class="emblem"></div><div class="big">Couldn\'t reach Maître</div><div style="max-width:34ch;margin:0 auto 18px">'+esc(detail||"")+'</div><button class="btn btn--ghost" id="retryBtn">Try again</button></div>';
      $("#retryBtn").onclick = loadConfig; return; }
  }

  function fmtDate(iso){
    // 2026-07-10 -> "Fri 10 Jul"
    var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso); if(!m) return iso;
    var d = new Date(Date.UTC(+m[1], +m[2]-1, +m[3]));
    var wd = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getUTCDay()];
    var mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getUTCMonth()];
    return wd+" "+(+m[3])+" "+mo;
  }
  function getDates(s){
    if (Array.isArray(s.dates) && s.dates.length) return s.dates;
    if (s.date) return [s.date];
    return [];
  }

  function personSvg(){ return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="7" r="3.2"/><path d="M3.5 20a6 6 0 0 1 11 0"/></svg>'; }
  function clockSvg(){ return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>'; }
  function calSvg(){ return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>'; }

  function render(){
    var list = $("#watchlist");
    var searches = STATE.config.searches || [];
    if (!searches.length){
      list.innerHTML = '<div class="state"><div class="emblem"></div><div class="big">No watches yet</div><div style="max-width:30ch;margin:0 auto 20px">Tap the gold + below to have Maître watch a table for you.</div></div>';
      renderOpenings(); return;
    }
    var html = "";
    searches.forEach(function(s, i){
      var paused = (s.notify||"both") === "none";
      var plat = (s.platform||"sevenrooms")==="opentable" ? "opentable":"sevenrooms";
      var platPill = plat==="opentable" ? '<span class="pill pill--ot">OpenTable</span>' : '<span class="pill pill--sr">SevenRooms</span>';
      var timeLabel = s.time_slot ? s.time_slot : ((s.window_start||"?")+" – "+(s.window_end||"?"));
      var timeKind = s.time_slot ? "Exact" : "Window";
      var dates = getDates(s);
      var notify = paused ? (s._prev_notify||"none") : (s.notify||"both");
      var notifyLabel = {push:"Push", email:"Email", both:"Push + Email", none:"Off"}[notify] || notify;
      var daysPill = (+s.num_days>1) ? '<span class="pill">'+(+s.num_days)+' days</span>' : '';
      html += ''
        + '<article class="watch'+(paused?' is-paused':'')+'" data-i="'+i+'">'
        +   '<div class="watch-head">'
        +     '<div class="venue">'+esc(s.id||"Untitled")+'</div>'
        +     '<span class="statuschip '+(paused?'statuschip--pause':'statuschip--live')+'"><span class="tinydot"></span>'+(paused?'Paused':'Watching')+'</span>'
        +   '</div>'
        +   '<div class="meta">'
        +     '<div class="m">'+personSvg()+'<span><span class="k">Party</span><span class="v">'+esc(s.party_size||2)+' covers</span></span></div>'
        +     '<div class="m">'+clockSvg()+'<span><span class="k">'+timeKind+'</span><span class="v mono">'+esc(timeLabel)+'</span></span></div>'
        +     '<div class="m" style="grid-column:1 / -1">'+calSvg()+'<span style="flex:1"><span class="k">Dates</span><span class="datechips">'+(dates.length?dates.map(function(d){return '<span class="datechip">'+esc(fmtDate(d))+'</span>';}).join(""):'<span class="v">—</span>')+'</span></span></div>'
        +   '</div>'
        +   '<div class="watch-actions">'
        +     platPill
        +     daysPill
        +     '<span class="pill">'+notifyLabel+'</span>'
        +     '<div style="flex:1"></div>'
        +     '<button class="linkbtn" data-edit="'+i+'">Edit</button>'
        +     '<div class="toggle'+(paused?'':' on')+'" data-toggle="'+i+'" role="switch" aria-checked="'+(!paused)+'" tabindex="0" aria-label="Watching '+esc(s.id||"")+'"><span class="knob"></span></div>'
        +   '</div>'
        + '</article>';
    });
    list.innerHTML = html;
    renderOpenings();
  }

  function renderOpenings(){
    var searches = (STATE.config.searches||[]);
    var active = searches.filter(function(s){ return (s.notify||"both")!=="none"; });
    var venues = active.reduce(function(n,s){ return n + ((s.venues||[]).length||0); }, 0);
    $("#openings").innerHTML = ''
      + '<div class="watch" style="text-align:center;padding:26px 20px">'
      +   '<div class="emblem" style="width:44px;height:44px;margin-bottom:14px"></div>'
      +   '<div class="venue" style="font-size:22px">Watching '+active.length+' '+(active.length===1?'restaurant':'restaurants')+'</div>'
      +   '<p style="color:var(--muted);margin:8px 0 0;font-size:14px">'+venues+' venue'+(venues===1?'':'s')+' polled every minute. The instant a table opens, an alert lands on your phone by push &amp; email — even when this app is closed.</p>'
      + '</div>'
      + '<p class="helper" style="text-align:center;margin:16px 0 22px">A live in-app feed of found tables is coming later. For now alerts arrive through your existing push &amp; email.</p>'
      + '<button class="btn btn--ghost btn--block" id="resetAlerts">Reset alert history</button>'
      + '<p class="helper" style="text-align:center;margin-top:8px">Lets tables you were already alerted about notify again.</p>';
    var rb = document.getElementById("resetAlerts");
    if (rb) rb.onclick = resetAlerts;
  }

  function resetAlerts(){
    if(!window.confirm("Reset alert history? Tables you've already been notified about can alert again.")) return;
    if(!STATE.config.global || typeof STATE.config.global !== "object") STATE.config.global = {};
    STATE.config.global.reset_nonce = String(Date.now());
    saveConfig("Alert history reset");
  }

  // ---- Tabs ----
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click", function(){
      var v = t.dataset.view;
      document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
      t.classList.add("active");
      $("#view-book").classList.toggle("show", v==="book");
      $("#view-openings").classList.toggle("show", v==="openings");
      $(".body").scrollTop = 0;
    });
  });

  // ---- Toggle pause/resume (delegated) ----
  $("#watchlist").addEventListener("click", function(e){
    var tg = e.target.closest("[data-toggle]");
    if (tg){ togglePause(+tg.dataset.toggle); return; }
    var ed = e.target.closest("[data-edit]");
    if (ed){ openSheet(+ed.dataset.edit); return; }
  });

  function togglePause(i){
    var s = STATE.config.searches[i]; if(!s) return;
    if ((s.notify||"both") === "none"){ s.notify = s._prev_notify || "both"; delete s._prev_notify; }
    else { s._prev_notify = s.notify || "both"; s.notify = "none"; }
    render();
    saveConfig((s.notify==="none") ? "Paused" : "Watching");
  }

  // ---- Sheet (add / edit) ----
  var scrim = $("#scrim"), sheet = $("#sheet"), sheetDates = [];
  function segSet(id, val){
    document.querySelectorAll("#"+id+" .seg").forEach(function(b){ b.classList.toggle("active", b.dataset.v===val); });
  }
  function segGet(id){ var a = document.querySelector("#"+id+" .seg.active"); return a?a.dataset.v:null; }
  function renderDateChips(){
    $("#dateChips").innerHTML = sheetDates.map(function(d){ return '<span class="rmchip" data-d="'+d+'">'+esc(fmtDate(d))+' ✕</span>'; }).join("");
  }
  $("#dateChips").addEventListener("click", function(e){
    var c = e.target.closest(".rmchip"); if(!c) return;
    sheetDates = sheetDates.filter(function(d){ return d!==c.dataset.d; }); renderDateChips();
  });
  $("#addDate").addEventListener("click", function(){
    var v = $("#f-date").value; if(v && sheetDates.indexOf(v)<0){ sheetDates.push(v); sheetDates.sort(); renderDateChips(); }
  });

  var party = 2, numDays = 1;
  function setParty(n){ party = Math.max(1, Math.min(20, n)); $("#pnum").textContent = party; }
  function setDays(n){ numDays = Math.max(1, Math.min(7, n)); $("#dnum").textContent = numDays; }
  $("#pplus").onclick = function(){ setParty(party+1); };
  $("#pminus").onclick = function(){ setParty(party-1); };
  $("#dplus").onclick = function(){ setDays(numDays+1); };
  $("#dminus").onclick = function(){ setDays(numDays-1); };

  // Slug auto-extract: turn a pasted SevenRooms/OpenTable URL into its slug.
  function extractSlug(text, platform){
    text = (text||"").trim(); if(!text) return text;
    var m;
    if (platform === "opentable"){
      m = text.match(/\/r\/([a-zA-Z0-9_\-]+)/); if(m) return m[1];
    } else {
      m = text.match(/[?&]venue=([a-zA-Z0-9_\-]+)/); if(m) return m[1];
      m = text.match(/\/reservations\/([a-zA-Z0-9_\-]+)/); if(m) return m[1];
    }
    return text;
  }
  $("#f-venues").addEventListener("blur", function(){
    var plat = segGet("platSeg") || "sevenrooms";
    var cleaned = this.value.split(",").map(function(v){ return extractSlug(v, plat); }).filter(Boolean);
    if (cleaned.length) this.value = cleaned.join(", ");
  });

  // Load available times for the first venue + first date (exact-time mode).
  $("#loadTimes").addEventListener("click", function(){
    var plat = segGet("platSeg") || "sevenrooms";
    var venue = extractSlug(($("#f-venues").value.split(",")[0]||"").trim(), plat);
    var date = sheetDates[0] || $("#f-date").value;
    if(!venue){ toast("Add a venue slug first", true); return; }
    if(!date){ toast("Pick a date first", true); return; }
    var btn = this; btn.textContent = "Loading…"; btn.disabled = true;
    var headers = {}; if (STATE.key) headers["x-access-key"] = STATE.key;
    fetch("api/times?platform="+encodeURIComponent(plat)+"&venue="+encodeURIComponent(venue)+"&date="+encodeURIComponent(date)+"&party="+party, { headers: headers })
      .then(function(r){ return r.json(); })
      .then(function(res){
        var times = (res && res.times) || [];
        if(!times.length){ $("#timeChips").innerHTML = '<span class="helper">No open times found — enter one manually above.</span>'; return; }
        $("#timeChips").innerHTML = times.map(function(t){ var hhmm=t.split(" ")[0]; return '<span class="rmchip" data-t="'+hhmm+'">'+esc(t)+'</span>'; }).join("");
      })
      .catch(function(){ $("#timeChips").innerHTML = '<span class="helper">Couldn\'t load times — enter one manually above.</span>'; })
      .finally(function(){ btn.textContent = "Load available times"; btn.disabled = false; });
  });
  $("#timeChips").addEventListener("click", function(e){
    var c = e.target.closest(".rmchip"); if(!c || !c.dataset.t) return;
    $("#f-exact").value = c.dataset.t;
    document.querySelectorAll("#timeChips .rmchip").forEach(function(x){ x.style.borderColor=""; x.style.color=""; });
    c.style.borderColor = "var(--gold)"; c.style.color = "var(--gold-bright)";
  });

  document.querySelectorAll(".segmented").forEach(function(seg){
    seg.addEventListener("click", function(e){
      var b = e.target.closest(".seg"); if(!b) return;
      seg.querySelectorAll(".seg").forEach(function(x){ x.classList.remove("active"); });
      b.classList.add("active");
      if (seg.id === "timeSeg"){
        var exact = b.dataset.v === "exact";
        $("#windowRow").style.display = exact ? "none" : "flex";
        $("#exactRow").style.display = exact ? "block" : "none";
      }
    });
  });

  function openSheet(index){
    STATE.editIndex = (typeof index === "number") ? index : null;
    var editing = STATE.editIndex !== null;
    $("#sheetTitle").textContent = editing ? "Edit watch" : "New watch";
    $("#saveBtn").textContent = editing ? "Save changes" : "Start watching";
    $("#deleteBtn").style.display = editing ? "block" : "none";

    var s = editing ? STATE.config.searches[STATE.editIndex] : null;
    var plat = s ? ((s.platform||"sevenrooms")==="opentable"?"opentable":"sevenrooms") : "sevenrooms";
    segSet("platSeg", plat);
    $("#f-name").value = s ? (s.id||"") : "";
    $("#f-venues").value = s ? ((s.venues||[]).join(", ")) : "";
    setParty(s ? (parseInt(s.party_size,10)||2) : 2);
    setDays(s ? (parseInt(s.num_days,10)||1) : 1);
    $("#f-email").value = s ? (s.email_to||"") : "";
    segSet("notifySeg", s ? (s.notify||"push") : "push");

    var exact = s ? !!(s.time_slot) : false;
    segSet("timeSeg", exact ? "exact" : "window");
    $("#windowRow").style.display = exact ? "none" : "flex";
    $("#exactRow").style.display = exact ? "block" : "none";
    $("#f-ws").value = (s && s.window_start) || "19:00";
    $("#f-we").value = (s && s.window_end) || "21:30";
    $("#f-exact").value = (s && s.time_slot) || "19:00";
    $("#timeChips").innerHTML = "";

    sheetDates = s ? getDates(s).slice() : [];
    renderDateChips();

    scrim.classList.add("open"); sheet.classList.add("open");
  }
  function closeSheet(){ scrim.classList.remove("open"); sheet.classList.remove("open"); }
  $("#addBtn").onclick = function(){ openSheet(); };
  scrim.onclick = closeSheet;
  $("#closeSheetBtn").onclick = closeSheet;
  $("#cancelBtn").onclick = closeSheet;

  // Swipe (or drag) the grab handle downward to dismiss the sheet.
  (function(){
    var dz = $("#dragzone"), startY = 0, dy = 0, dragging = false;
    function move(y){ dy = Math.max(0, y - startY); sheet.style.transform = "translate(-50%," + dy + "px)"; }
    function begin(y){ startY = y; dy = 0; dragging = true; sheet.style.transition = "none"; }
    function finish(){ if(!dragging) return; dragging = false; sheet.style.transition = ""; sheet.style.transform = ""; if (dy > 110) closeSheet(); }
    dz.addEventListener("touchstart", function(e){ begin(e.touches[0].clientY); }, {passive:true});
    dz.addEventListener("touchmove", function(e){ if(dragging) move(e.touches[0].clientY); }, {passive:true});
    dz.addEventListener("touchend", finish);
    dz.addEventListener("touchcancel", finish);
    dz.addEventListener("mousedown", function(e){
      begin(e.clientY);
      function mm(ev){ if(dragging) move(ev.clientY); }
      function mu(){ document.removeEventListener("mousemove", mm); document.removeEventListener("mouseup", mu); finish(); }
      document.addEventListener("mousemove", mm); document.addEventListener("mouseup", mu);
    });
  })();
  $("#refreshBtn").onclick = function(){ this.classList.add("spin"); var b=this; loadConfig(); setTimeout(function(){ b.classList.remove("spin"); }, 700); };

  $("#saveBtn").onclick = function(){
    var plat = segGet("platSeg") || "sevenrooms";
    var name = $("#f-name").value.trim();
    var venues = $("#f-venues").value.split(",").map(function(v){return extractSlug(v, plat);}).filter(Boolean);
    if (!venues.length){ toast("Add at least one venue slug", true); return; }
    var exact = segGet("timeSeg") === "exact";
    var dates = sheetDates.slice(); if(!dates.length){ toast("Add at least one date", true); return; }
    var rec = {
      id: name || "Untitled",
      platform: plat,
      venues: venues,
      party_size: party,
      date: dates[0],
      dates: dates,
      num_days: numDays,
      time_slot: exact ? ($("#f-exact").value.trim()) : "",
      window_start: exact ? "" : ($("#f-ws").value.trim()),
      window_end: exact ? "" : ($("#f-we").value.trim()),
      notify: segGet("notifySeg") || "push",
      email_to: $("#f-email").value.trim(),
      salt: String(Date.now())
    };
    if (STATE.editIndex !== null){ STATE.config.searches[STATE.editIndex] = rec; }
    else { STATE.config.searches.push(rec); }
    var btn = this; btn.disabled = true;
    saveConfig(STATE.editIndex!==null ? "Changes saved" : "Now watching "+rec.id)
      .then(function(){ closeSheet(); })
      .finally(function(){ btn.disabled = false; });
  };

  $("#deleteBtn").onclick = function(){
    if (STATE.editIndex === null) return;
    if (!window.confirm("Delete this watch?")) return;
    STATE.config.searches.splice(STATE.editIndex, 1);
    saveConfig("Deleted").then(closeSheet);
  };

  // ---- Service worker (for install / offline shell) ----
  if ("serviceWorker" in navigator){
    window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
  }

  // ---- Auto-refresh: when the app returns to the foreground, quietly check
  // whether a newer build has been deployed and reload if so. This fixes iOS
  // "resuming" the app on the old version. Won't reload while a form is open.
  var _appBaseline = null, _checking = false;
  function checkForUpdate(){
    if (_checking) return; _checking = true;
    fetch("index.html", { cache: "no-store", headers: { "Accept": "text/html" } })
      .then(function(r){ return r.text(); })
      .then(function(t){
        if (_appBaseline === null){ _appBaseline = t; return; }
        if (t !== _appBaseline && !(sheet && sheet.classList.contains("open"))){ location.reload(); }
      })
      .catch(function(){})
      .finally(function(){ _checking = false; });
  }
  document.addEventListener("visibilitychange", function(){ if (document.visibilityState === "visible") checkForUpdate(); });
  window.addEventListener("pageshow", function(){ checkForUpdate(); });
  checkForUpdate();

  loadConfig();
})();
</script>
</body>
</html>
